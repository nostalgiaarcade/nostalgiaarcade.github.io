```html
<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nostalgia Arcade</title>

    <meta name="description" content="Juegos retro portables arcade para Windows">

    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- CABECERA -->

    <header>

        <div class="logo">

            <img src="logo/logo.png" alt="Nostalgia Arcade">

            <div>

                <h1>Nostalgia Arcade</h1>

                <p>Juegos retro portables arcade para Windows</p>

            </div>

        </div>

    </header>


    <!-- BUSCADOR -->

    <section class="busqueda">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Buscar juego...">

    </section>


    <!-- CATEGORÍAS -->

    <section class="categorias">

        <button class="category active" data-category="Todos">

            <span class="texto blanco">Todos</span>

        </button>

        <button class="category" data-category="Acción">

            <img src="iconos/accion.png" alt="Acción">

            <span class="texto naranja">Acción</span>

        </button>

        <button class="category" data-category="Peleas">

            <img src="iconos/peleas.png" alt="Peleas">

            <span class="texto rojo">Peleas</span>

        </button>

        <button class="category" data-category="Aviones">

            <img src="iconos/aviones.png" alt="Aviones">

            <span class="texto azul">Aviones</span>

        </button>

        <button class="category" data-category="Deportes">

            <img src="iconos/deportes.png" alt="Deportes">

            <span class="texto verde">Deportes</span>

        </button>

        <button class="category" data-category="Puzles">

            <img src="iconos/puzles.png" alt="Puzles">

            <span class="texto morado">Puzles</span>

        </button>

    </section>


    <!-- JUEGO DESTACADO -->

    <section id="featuredGame">

    </section>


    <!-- CATÁLOGO -->

    <section class="contenedor">

        <h2>🎮 Catálogo de Portables</h2>

        <div id="games" class="grid"></div>

    </section>


    <!-- FOOTER -->

    <footer>

        <p>

            🎮 Juegos publicados:
            <span id="gameCounter"></span>

        </p>

        <div id="contador">

            👁️ Visitas:
            <span id="visitCounter">

                Próximamente

            </span>

        </div>

    </footer>

    <script src="games.js"></script>
    <script src="script.js"></script>

</body>

</html>
```
