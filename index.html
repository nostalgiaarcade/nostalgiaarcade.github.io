<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nostalgia Arcade</title>

    <meta name="description"
        content="Colección personal de juegos arcade portables para Windows. Descarga, ejecuta y juega.">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================================= -->
    <!-- CABECERA -->
    <!-- ========================================= -->

    <header>

        <div class="logo">

            <img src="logo/logo.png" alt="Nostalgia Arcade">

            <div class="logo-info">

                <!-- Contador automático -->
                <div id="gameCounter" class="game-counter">
                    🎮 0 Portables disponibles
                </div>

                <!-- Última actualización -->
                <div class="last-update">
                    📅 Última actualización: 15 de julio de 2026
                </div>

                <h1>Nostalgia Arcade</h1>

                <p>Colección personal de juegos arcade portables para Windows</p>

            </div>

        </div>

    </header>

    <!-- ========================================= -->
    <!-- BUSCADOR -->
    <!-- ========================================= -->

    <section class="busqueda">

        <input
            type="text"
            id="searchInput"
            placeholder="🔍 Buscar juego...">

    </section>

    <!-- ========================================= -->
    <!-- MENÚ SUPERIOR -->
    <!-- ========================================= -->

    <nav class="top-menu">

        <a href="proyecto.html">El Proyecto</a>

        <span>·</span>

        <a href="donaciones.html">Donaciones</a>

        <span>·</span>

        <a href="#">Foro</a>

    </nav>

    <!-- ========================================= -->
    <!-- CATEGORÍAS -->
    <!-- ========================================= -->

    <section class="categorias">

        <button class="category active" data-category="Todos">

            <img src="iconos/todos.png" alt="Todos">

            <span class="texto naranja">
                Todos
            </span>

        </button>

        <button class="category" data-category="Acción">

            <img src="iconos/accion.png" alt="Acción">

            <span class="texto naranja">
                Acción
            </span>

        </button>

        <button class="category" data-category="Peleas">

            <img src="iconos/peleas.png" alt="Peleas">

            <span class="texto rojo">
                Peleas
            </span>

        </button>

        <button class="category" data-category="Aviones">

            <img src="iconos/aviones.png" alt="Aviones">

            <span class="texto azul">
                Aviones
            </span>

        </button>

        <button class="category" data-category="Deportes">

            <img src="iconos/deportes.png" alt="Deportes">

            <span class="texto verde">
                Deportes
            </span>

        </button>

        <button class="category" data-category="Puzles">

            <img src="iconos/puzles.png" alt="Puzles">

            <span class="texto morado">
                Puzles
            </span>

        </button>

    </section>

    <!-- ========================================= -->
    <!-- LISTADO DE JUEGOS -->
    <!-- ========================================= -->

    <main class="contenedor">

        <h2>ÚLTIMOS PORTABLES CREADOS</h2>

        <div
            id="games"
            class="grid">
        </div>

    </main>

    <!-- ========================================= -->
    <!-- FOOTER -->
    <!-- ========================================= -->

    <footer>

        <div class="footer-links">

            <a href="#">YouTube</a>

            <span>·</span>

            <a href="#">Contacto</a>

        </div>

     <p>

<a href="https://visitorbadge.io/status?path=https%3A%2F%2Fnostalgiaarcade.github.io%2F">
    <img
        src="https://api.visitorbadge.io/api/visitors?path=https%3A%2F%2Fnostalgiaarcade.github.io%2F&label=Visitas&labelColor=%23000000&countColor=%23FFD700"
        alt="Contador de visitas">
</a>
         
</p>

    </footer>

    <!-- ========================================= -->
    <!-- DATOS -->
    <!-- ========================================= -->

    <script src="games.js"></script>

    <!-- ========================================= -->
    <!-- FUNCIONALIDAD -->
    <!-- ========================================= -->

    <script src="script.js"></script>

</body>

</html>
