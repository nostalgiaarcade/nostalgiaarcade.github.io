<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Portables</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    text-align:center;
    padding:60px 20px;
    background:#1b1b1b;
}

h1{
    font-size:48px;
    margin:0;
}

p{
    color:#bbb;
    font-size:18px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:#202020;
    border-radius:12px;
    padding:25px;
    margin-bottom:20px;
}

.button{
    display:inline-block;
    margin-top:15px;
    padding:12px 22px;
    background:#00b894;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

.button:hover{
    background:#00d1a5;
}

footer{
    text-align:center;
    color:#666;
    padding:40px;
}
</style>

</head>

<body>

<header>
<h1>🎮 Retro Portables</h1>

<p>Portable arcade games ready to play.</p>

</header>

<div class="container">

<div class="card">
<h2>Último lanzamiento</h2>

<p>Pang 3 Portable 2026</p>

<a class="button" href="#">Ver juego</a>
</div>

<div class="card">
<h2>Catálogo</h2>

<p>Consulta todos los juegos disponibles.</p>

<a class="button" href="#">Ver catálogo</a>
</div>

<div class="card">
<h2>Donaciones</h2>

<p>Si te gusta el proyecto puedes apoyarlo.</p>

<a class="button" href="#">Donar</a>
</div>

</div>

<footer>

Retro Portables © 2026

</footer>

</body>
</html>
